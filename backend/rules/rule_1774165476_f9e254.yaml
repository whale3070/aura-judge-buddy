# Aura 规则页可直接上传。五维中文名须与评审输出一致，便于前端解析 0–20 分并套用阶梯档。
# 字母档 S/A/B/C/D 由前端 dimensionTier（多模型报告取五维算术平均后）按下方「阶梯互斥」规则计算，
# 与下方 gradingBands（加权总分 0–100 档）是两套尺度：前者用于排名分档，后者可作总分展示参考。

version: "2.0.0"
name: "TON 黑客松 · 五维0-20 阶梯分档 v2"
updatedAt: "2026-03-22"

dimensions:
  - key: "innovation"
    name: "创新性"
    weight: 20
    description: |
      满分 20。评估新颖度、差异化、问题定义与创意。
      评审输出中必须包含一行（可带 /20）：创新性: <0-20 的分数>

  - key: "technical"
    name: "技术实现"
    weight: 20
    description: |
      满分 20。评估工程架构、可靠性、测试、安全与实现完整度。
      必须包含：技术实现: <分数>

  - key: "business"
    name: "商业价值"
    weight: 20
    description: |
      满分 20。评估需求真实性、市场潜力、商业模式清晰度。
      必须包含：商业价值: <分数>

  - key: "ux"
    name: "用户体验"
    weight: 20
    description: |
      满分 20。评估易用性、交互、文档与产品完成度。
      必须包含：用户体验: <分数>

  - key: "feasibility"
    name: "落地可行性"
    weight: 20
    description: |
      满分 20。评估部署难度、依赖风险、可验证交付路径。
      必须包含：落地可行性: <分数>

# 五维权重各 20，合计 100。下列区间为「加权总分」参考带（0–100），与字母阶梯并行存在；勿与单维 0–20 混淆。
gradingBands:
  - grade: "D"
    min: 0
    max: 49
    label: "加权总分偏低（参考）"
  - grade: "C"
    min: 50
    max: 59
    label: "加权总分中等偏下（参考）"
  - grade: "B"
    min: 60
    max: 69
    label: "加权总分中等（参考）"
  - grade: "A"
    min: 70
    max: 84
    label: "加权总分良好（参考）"
  - grade: "S"
    min: 85
    max: 100
    label: "加权总分优秀（参考）"

ecosystemModules:
  - key: "ton"
    name: "TON 生态补充项（可选）"
    enabled: false
    extraChecks:
      - key: "ton_integration"
        name: "TON 链 / 钱包 / 生态工具集成"
        weight: 10
        description: "若启用本模块，请在报告中单独说明与 TON 相关的集成深度（不计入五维 0–20 主行，可作文字评价）。"

notes: |
  【字母档 S/A/B/C/D — 阶梯互斥，判定顺序从高到低，命中即停止】
  对每个维度在 0–20 分制下取多模型报告的算术平均（五维须均能解析，否则前端显示「?」档）。

  - S 档：≥ 4 个维度 ≥ 18
  - A 档：≥ 3 个维度 ≥ 16（且不满足 S）
  - B 档：≥ 2 个维度 ≥ 14（且不满足 S、A）
  - C 档：≥ 1 个维度 ≥ 12（且不满足 S、A、B）
  - D 档：五个维度均 < 12

  设计意图：S/A 少、B/C 多、D 少；避免旧版「B 必含 C」导致 C 恒为空的问题。

  【评审输出要求】
  每个模型在报告正文中用中文维度名给出五维分数（示例：创新性: 16 或 创新性：16/20），
  以便系统解析。最后一行若需对决，可保留既有 DUEL_WINNER: A/B 约定。
